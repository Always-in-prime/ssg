<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Мое портфолио | Фрилансер</title>
    <meta name="description" content="Свяжитесь со мной для сотрудничества">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        nav {
            background: #f4f4f4;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h1 { color: #2c3e50; }
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        img { max-width: 100%; }
        .post-meta {
            color: #666;
            font-size: 0.9em;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Главная</a>
        <a href="/about.html">О нас</a>
    </nav>
    
    <main>
        <h1>Контакты</h1>
        <section class="contact-section">
    <div class="container">
        <h1>Свяжитесь со мной</h1>
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Контактная информация</h3>
                <div class="contact-info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <strong>Телефон</strong><br>
                        <a href="tel:+71234567890">+7 (123) 456-78-90</a>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <strong>Email</strong><br>
                        <a href="mailto:your@email.com">your@email.com</a>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fab fa-telegram"></i>
                    <div>
                        <strong>Telegram</strong><br>
                        <a href="https://t.me/YOUR_USERNAME">@your_username</a>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fab fa-github"></i>
                    <div>
                        <strong>GitHub</strong><br>
                        <a href="https://github.com/YOUR_USERNAME">github.com/username</a>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <h3>Написать мне</h3>
                <form action="https://formspree.io/f/your-form-id" method="POST">
                    <div class="form-group">
                        <label for="name">Ваше имя</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Сообщение</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
        </div>
    </div>
</section>

    </main>
    
    <footer>
        <p>© 2026 Мое портфолио | Фрилансер. Сгенерировано SSG.</p>
    </footer>
</body>
</html>
